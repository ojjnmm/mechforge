[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mechforge-core"
version = "0.4.0"
description = "MechForge Core - Configuration management"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
]

[tool.setuptools]
package-dir = {"mechforge_core" = "src/mechforge_core"}

[tool.setuptools.packages.find]
where = ["src"]
