[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mechforge-knowledge"
version = "0.4.0"
description = "MechForge Knowledge - Knowledge base search"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "rich>=13.0",
]

[project.optional-dependencies]
rag = [
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
]

[tool.setuptools]
package-dir = {"mechforge_knowledge" = "src/mechforge_knowledge"}

[tool.setuptools.packages.find]
where = ["src"]
