[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mechforge-theme"
version = "0.4.0"
description = "MechForge Theme - UI colors and styles"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "rich>=13.0",
]

[tool.setuptools]
package-dir = {"mechforge_theme" = "src/mechforge_theme"}

[tool.setuptools.packages.find]
where = ["src"]
