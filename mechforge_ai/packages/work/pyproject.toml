[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mechforge-work"
version = "0.4.0"
description = "MechForge Work - Local CAE Workbench"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "rich>=13.0",
    "typer>=0.9.0",
]

[project.optional-dependencies]
cae = [
    "gmsh>=4.13.0",
    "pyvista>=0.44.0",
    "trimesh>=4.0.0",
    "numpy>=1.24.0",
]

[tool.setuptools]
package-dir = {"mechforge_work" = "src/mechforge_work"}

[tool.setuptools.packages.find]
where = ["src"]
