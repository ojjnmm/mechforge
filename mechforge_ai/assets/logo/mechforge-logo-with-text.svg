<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 标志部分 -->
  <g transform="translate(130, 150)">
    <!-- 外齿轮 -->
    <path d="M 0,-110 L 10,-95 L 30,-95 L 40,-110 
             L 60,-90 L 75,-90 L 82,-105 
             L 105,-85 L 115,-85 L 115,-70
             L 135,-52 L 135,-40 L 115,-25
             L 135,-8 L 120,2 L 120,22
             L 135,35 L 115,55 L 115,68
             L 105,68 L 82,88 L 75,73
             L 60,73 L 40,93 L 30,78
             L 10,78 L 0,93 L -10,78
             L -30,78 L -40,93 L -60,73
             L -75,73 L -82,88 L -105,68
             L -115,68 L -115,55 L -135,35
             L -115,22 L -115,2 L -135,-8
             L -115,-25 L -135,-40 L -135,-52
             L -115,-70 L -115,-85 L -105,-85
             L -82,-105 L -75,-90 L -60,-90
             L -40,-110 L -30,-95 L -10,-95 Z" 
          fill="url(#gearGradient)" 
          filter="url(#shadow)"/>
    
    <!-- 内圆 -->
    <circle cx="0" cy="0" r="50" fill="url(#centerGradient)"/>
    
    <!-- AI 电路 -->
    <g fill="white">
      <circle cx="0" cy="0" r="12"/>
      <circle cx="0" cy="-30" r="7"/>
      <circle cx="26" cy="15" r="7"/>
      <circle cx="-26" cy="15" r="7"/>
    </g>
    <g stroke="white" stroke-width="3" stroke-linecap="round">
      <line x1="0" y1="-12" x2="0" y2="-23"/>
      <line x1="10" y1="6" x2="22" y2="11"/>
      <line x1="-10" y1="6" x2="-22" y2="11"/>
    </g>
  </g>
  
  <!-- 文字部分 -->
  <g transform="translate(280, 165)">
    <!-- MechForge -->
    <text x="0" y="0" 
          font-family="Arial, sans-serif" 
          font-size="72" 
          font-weight="bold" 
          fill="#0f172a">
      Mech<tspan fill="#3b82f6">Forge</tspan>
    </text>
    
    <!-- AI 标签 -->
    <rect x="380" y="-50" width="60" height="35" rx="8" fill="#8b5cf6"/>
    <text x="410" y="-26" 
          font-family="Arial, sans-serif" 
          font-size="20" 
          font-weight="bold" 
          fill="white" 
          text-anchor="middle">AI</text>
    
    <!-- 副标题 -->
    <text x="0" y="40" 
          font-family="Arial, sans-serif" 
          font-size="24" 
          fill="#64748b">
      机械设计师的智能工作台
    </text>
  </g>
</svg>