<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <!-- 发光效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="#0f172a" stroke="#1e293b" stroke-width="4"/>
  
  <!-- 外圈齿轮 - 12齿 -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <path d="M 0,-220 
             L 15,-200 L 45,-200 L 60,-220
             L 85,-190 L 110,-190 L 120,-215
             L 155,-180 L 180,-180 L 180,-155
             L 215,-120 L 215,-110 L 190,-85
             L 220,-60 L 200,-45 L 200,-15
             L 220,0 L 200,15 L 200,45
             L 220,60 L 190,85 L 215,110
             L 215,120 L 180,155 L 180,180
             L 155,180 L 120,215 L 110,190
             L 85,190 L 60,220 L 45,200
             L 15,200 L 0,220 L -15,200
             L -45,200 L -60,220 L -85,190
             L -110,190 L -120,215 L -155,180
             L -180,180 L -180,155 L -215,120
             L -215,110 L -190,85 L -220,60
             L -200,45 L -200,15 L -220,0
             L -200,-15 L -200,-45 L -220,-60
             L -190,-85 L -215,-110 L -215,-120
             L -180,-155 L -180,-180 L -155,-180
             L -120,-215 L -110,-190 L -85,-190
             L -60,-220 L -45,-200 L -15,-200
             Z" 
          fill="url(#gearGradient)" 
          opacity="0.9"/>
  </g>
  
  <!-- 中层齿轮环 -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#475569" stroke-width="2" opacity="0.5"/>
  
  <!-- 内层齿轮 - 8齿 -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <path d="M 0,-130 
             L 25,-100 L 55,-100 L 80,-130
             L 110,-100 L 130,-80 L 130,-55
             L 160,-25 L 160,25 L 130,55
             L 130,80 L 110,100 L 80,130
             L 55,100 L 25,100 L 0,130
             L -25,100 L -55,100 L -80,130
             L -110,100 L -130,80 L -130,55
             L -160,25 L -160,-25 L -130,-55
             L -130,-80 L -110,-100 L -80,-130
             L -55,-100 L -25,-100 Z" 
          fill="#1e293b" 
          stroke="#334155" 
          stroke-width="3"/>
  </g>
  
  <!-- 中心圆 - AI 核心 -->
  <circle cx="256" cy="256" r="70" fill="url(#centerGradient)" filter="url(#glow)"/>
  
  <!-- AI 电路图案 -->
  <g transform="translate(256, 256)" stroke="white" stroke-width="3" fill="none" opacity="0.9">
    <!-- 中心节点 -->
    <circle cx="0" cy="0" r="15" fill="white" stroke="none"/>
    
    <!-- 电路线路 -->
    <line x1="0" y1="-15" x2="0" y2="-35" />
    <line x1="0" y1="15" x2="0" y2="35" />
    <line x1="-15" y1="0" x2="-35" y2="0" />
    <line x1="15" y1="0" x2="35" y2="0" />
    
    <!-- 对角线路 -->
    <line x1="-10" y1="-10" x2="-25" y2="-25" />
    <line x1="10" y1="-10" x2="25" y2="-25" />
    <line x1="-10" y1="10" x2="-25" y2="25" />
    <line x1="10" y1="10" x2="25" y2="25" />
    
    <!-- 外圈节点 -->
    <circle cx="0" cy="-35" r="6" fill="#f59e0b" stroke="none"/>
    <circle cx="0" cy="35" r="6" fill="#f59e0b" stroke="none"/>
    <circle cx="-35" cy="0" r="6" fill="#f59e0b" stroke="none"/>
    <circle cx="35" cy="0" r="6" fill="#f59e0b" stroke="none"/>
    
    <circle cx="-25" cy="-25" r="5" fill="#ef4444" stroke="none"/>
    <circle cx="25" cy="-25" r="5" fill="#ef4444" stroke="none"/>
    <circle cx="-25" cy="25" r="5" fill="#ef4444" stroke="none"/>
    <circle cx="25" cy="25" r="5" fill="#ef4444" stroke="none"/>
  </g>
  
  <!-- 装饰性光点 -->
  <circle cx="120" cy="120" r="4" fill="#60a5fa" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="392" cy="120" r="3" fill="#a78bfa" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="392" r="3" fill="#34d399" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="392" cy="392" r="4" fill="#fbbf24" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>