events {
    worker_connections 1024;
}

http {
    upstream solvers {
        least_conn;
        server calculix-solver-1:8080 weight=1;
        server calculix-solver-2:8080 weight=1;
    }

    server {
        listen 80;
        server_name localhost;

        # 健康检查
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # 状态端点
        location /status {
            proxy_pass http://solvers/status;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 求解任务 (负载均衡)
        location /solve {
            proxy_pass http://solvers/solve;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # 任务查询
        location /jobs {
            proxy_pass http://solvers/jobs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 其他请求
        location / {
            proxy_pass http://solvers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}